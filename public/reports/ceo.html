<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stories — CEO Dashboard</title>
<style>
  :root{--green:#086C42;--green-d:#065234;--ink:#0d1b12;--muted:#6B7D73;--line:#e3ece6;--bg:#f4f7f5;--card:#fff;
    --ok:#1a8a4f;--okbg:#e7f5ec;--warn:#b8860b;--warnbg:#fdf4e0;--bad:#c0392b;--badbg:#fbeae7;}
  *{box-sizing:border-box;} html,body{margin:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);}
  .wrap{max-width:1080px;margin:0 auto;padding:0 0 60px;}
  header{background:var(--green);color:#fff;padding:18px 26px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  header .mark{width:38px;height:38px;border-radius:10px;background:#ffffff22;display:flex;align-items:center;justify-content:center;font-size:20px;}
  header h1{font-size:19px;margin:0;font-weight:800;}
  header .meta{font-size:12.5px;opacity:.9;margin-top:3px;}
  header .ctl{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:12.5px;}
  header input[type=date]{border:0;border-radius:8px;padding:6px 10px;font-family:inherit;font-size:12.5px;}
  header button{border:0;border-radius:8px;padding:7px 13px;background:#ffffff22;color:#fff;font-weight:700;font-size:12.5px;cursor:pointer;}
  .live{display:inline-flex;align-items:center;gap:6px;}
  .live .dot{width:9px;height:9px;border-radius:50%;background:#8ff0b6;box-shadow:0 0 0 0 rgba(143,240,182,.7);animation:p 1.8s infinite;}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(143,240,182,.6);}70%{box-shadow:0 0 0 7px rgba(143,240,182,0);}100%{box-shadow:0 0 0 0 rgba(143,240,182,0);}}
  .pad{padding:22px 26px;}
  .sub{color:var(--muted);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin:24px 0 10px;}
  .hero{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .h{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 18px;}
  .h .n{font-size:38px;font-weight:800;line-height:1;}
  .h .l{font-size:12px;color:var(--muted);margin-top:9px;font-weight:600;}
  .h .s{font-size:11.5px;color:var(--muted);margin-top:4px;}
  .h.g .n{color:var(--green);} .h.w .n{color:var(--warn);} .h.b .n{color:var(--bad);}
  .funnel{display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  .fstep{padding:14px 16px;border-left:1px solid var(--line);position:relative;}
  .fstep:first-child{border-left:0;}
  .fstep .lv{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
  .fstep .c{font-size:28px;font-weight:800;margin-top:4px;}
  .fstep .nm{font-size:12px;color:var(--muted);margin-top:2px;}
  .fstep.hot .c{color:var(--bad);}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  th{background:#f0f5f2;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);padding:10px 14px;font-weight:700;}
  td{padding:11px 14px;border-top:1px solid var(--line);font-size:13.5px;}
  td.b{font-weight:700;}
  .bar{height:7px;border-radius:4px;background:#eef3f0;width:100px;display:inline-block;vertical-align:middle;overflow:hidden;}
  .bar>i{display:block;height:100%;background:var(--green);}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;}
  .pill.ok{background:var(--okbg);color:var(--ok);} .pill.warn{background:var(--warnbg);color:var(--warn);} .pill.bad{background:var(--badbg);color:var(--bad);} .pill.mut{background:#eef1ef;color:var(--muted);}
  .feed{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  .feed .it{display:flex;gap:13px;align-items:center;padding:12px 16px;border-top:1px solid var(--line);}
  .feed .it:first-child{border-top:0;}
  .feed .fl{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex:0 0 auto;background:var(--badbg);color:var(--bad);}
  .feed .fl.high{background:var(--warnbg);color:var(--warn);} .feed .fl.med{background:#eef1ef;color:var(--muted);}
  .feed .tx{flex:1 1 auto;} .feed .tx b{font-size:13.5px;} .feed .tx .d{font-size:12px;color:var(--muted);margin-top:2px;}
  .feed .ag{font-size:12px;color:var(--muted);white-space:nowrap;}
  .empty{padding:20px;text-align:center;color:var(--muted);font-size:13px;}
  .foot{color:var(--muted);font-size:11.5px;padding:14px 26px;}
  @media(max-width:820px){.hero,.funnel{grid-template-columns:repeat(2,1fr);}header .ctl{width:100%;margin-left:0;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="mark">&#9749;</div>
    <div>
      <h1>CEO Dashboard</h1>
      <div class="meta">Stories Coffee &middot; network live across all branches</div>
    </div>
    <div class="ctl">
      <span class="live"><span class="dot"></span> Live</span>
      <input type="date" id="date" />
      <button id="refresh">Refresh</button>
      <span id="updated"></span>
    </div>
  </header>

  <div class="pad">
    <div class="hero" id="hero"></div>

    <div class="sub">Escalation ladder &mdash; open now</div>
    <div class="funnel" id="funnel"></div>

    <div class="sub">Branch performance &mdash; today</div>
    <div id="branches"></div>

    <div class="sub">Live escalations feed</div>
    <div class="feed" id="feed"></div>
  </div>

  <div class="foot" id="foot">Stories OneApp &middot; CEO dashboard &middot; reads live operational data</div>
</div>

<script>
(function(){
  var BASE = 'https://stories-oneapp-production.up.railway.app/v1';
  var UID = 'ed73a968-ff2a-43cf-a966-11b49914fe91'; // Head Office (demo auth, same as app)
  var H = { 'x-user-id': UID };
  var LEVELS = ['Branch Manager','Area Manager','Operations','Head Office'];

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function pct(n){ return (n==null?0:Math.round(n)) + '%'; }
  function ageOf(iso){ if(!iso) return ''; var m=Math.max(0,Math.round((Date.now()-new Date(iso).getTime())/60000)); if(m<60) return m+' min'; var h=Math.floor(m/60); return h+'h '+(m%60)+'m'; }
  function sevPill(s){ s=(s||'').toLowerCase(); if(s==='critical') return '<span class="pill bad">Critical</span>'; if(s==='high') return '<span class="pill warn">High</span>'; return '<span class="pill mut">'+esc(s||'Medium')+'</span>'; }

  function localDate(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

  async function jget(p){ var r=await fetch(BASE+p,{headers:H}); if(!r.ok) throw new Error(p+' '+r.status); return r.json(); }

  async function load(date){
    var res = await Promise.all([
      jget('/exec-summary?date='+date).catch(function(){return {totals:{},branches:[],escalations:[]};}),
      jget('/escalations').catch(function(){return [];}),
      jget('/people').catch(function(){return [];})
    ]);
    var sum=res[0], escR=res[1], pplR=res[2];
    var people = Array.isArray(pplR)?pplR:(pplR.items||pplR.data||[]);
    var totalBranches = 0; var seen={};
    people.forEach(function(p){ var b=p.branch_id||p.branchId; if(b&&!seen[b]){seen[b]=1;totalBranches++;} });
    var escArr = Array.isArray(escR)?escR:(escR.items||escR.data||[]);
    render(sum, escArr, totalBranches||25);
  }

  function render(sum, escArr, totalBranches){
    var t = sum.totals||{};
    var open = escArr.filter(function(e){return e.status==='open';});
    var byLevel=[0,0,0,0];
    open.forEach(function(e){ var l=(e.currentLevel||1)-1; if(l<0)l=0; if(l>3)l=3; byLevel[l]++; });
    var hoOpen = byLevel[3];

    // hero
    document.getElementById('hero').innerHTML =
      hcard('g', pct(t.avgCompletion), 'Network completion', 'across reporting branches') +
      hcard('g', (t.branchesReporting||0)+' / '+totalBranches, 'Branches reporting', 'submitted today') +
      hcard(open.length?'b':'g', open.length, 'Open escalations', hoOpen+' at Head Office') +
      hcard((t.flaggedItems||0)?'w':'g', (t.flaggedItems||0), 'Flagged items today', 'Pending '+(t.pending||0)+' / Fixed '+(t.fixed||0)+' / Esc '+(t.escalated||0));

    // funnel
    document.getElementById('funnel').innerHTML = LEVELS.map(function(nm,i){
      return '<div class="fstep'+(i===3&&byLevel[i]?' hot':'')+'"><div class="lv">L'+(i+1)+'</div><div class="c">'+byLevel[i]+'</div><div class="nm">'+nm+'</div></div>';
    }).join('');

    // branches
    var brs = (sum.branches||[]).slice().sort(function(a,b){return (b.flagged||0)-(a.flagged||0) || (a.completion||0)-(b.completion||0);});
    var bhtml;
    if(!brs.length){ bhtml = '<div class="feed"><div class="empty">No branches have reported yet for this day.</div></div>'; }
    else {
      bhtml = '<table><thead><tr><th>Branch</th><th>Checklist</th><th>Status</th><th>Completion</th><th>Flags</th></tr></thead><tbody>'+
        brs.map(function(b){
          var st = (b.status||'').toLowerCase();
          var pill = st.indexOf('flag')>=0?'<span class="pill warn">Flagged</span>':(st==='approved'||st==='submitted'?'<span class="pill ok">'+esc(b.status)+'</span>':'<span class="pill mut">'+esc(b.status||'&mdash;')+'</span>');
          return '<tr><td class="b">'+esc(b.branch)+'</td><td>'+esc(b.checklist)+'</td><td>'+pill+'</td><td><span class="bar"><i style="width:'+(b.completion||0)+'%"></i></span> '+pct(b.completion)+'</td><td>'+(b.flagged||0)+'</td></tr>';
        }).join('')+'</tbody></table>';
    }
    document.getElementById('branches').innerHTML = bhtml;

    // feed
    var feed=document.getElementById('feed');
    if(!open.length){ feed.innerHTML='<div class="empty">No open escalations. Network is clear. &#127881;</div>'; }
    else {
      feed.innerHTML = open.slice(0,12).map(function(e){
        var sev=(e.severity||'').toLowerCase();
        var cls=sev==='critical'?'':(sev==='high'?'high':'med');
        var br=(e.branch&&e.branch.name)||e.branchName||e.branchId||'Branch';
        return '<div class="it"><div class="fl '+cls+'">&#9873;</div><div class="tx"><b>'+esc(br)+' &mdash; '+esc(e.reason||e.templateKey||'flagged item')+'</b>'+
          '<div class="d">'+sevPill(e.severity)+' &middot; at '+esc(e.levelTitle||('L'+(e.currentLevel||1)))+' &middot; '+esc(e.templateKey||'')+'</div></div>'+
          '<div class="ag">'+ageOf(e.createdAt)+'</div></div>';
      }).join('');
    }

    var u=new Date();
    document.getElementById('updated').textContent = 'updated '+String(u.getHours()).padStart(2,'0')+':'+String(u.getMinutes()).padStart(2,'0')+':'+String(u.getSeconds()).padStart(2,'0');
  }

  function hcard(cls,n,l,s){ return '<div class="h '+cls+'"><div class="n">'+n+'</div><div class="l">'+l+'</div><div class="s">'+s+'</div></div>'; }

  var dateEl=document.getElementById('date');
  dateEl.value = localDate();
  function go(){ load(dateEl.value).catch(function(err){ document.getElementById('foot').textContent='Could not load: '+err.message; }); }
  document.getElementById('refresh').addEventListener('click', go);
  dateEl.addEventListener('change', go);
  go();
  setInterval(go, 45000);
})();
</script>
</body>
</html>
